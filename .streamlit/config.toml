# AudioLab AI v2 -- Streamlit base theme
# Mixed: white main area + dark navy sidebar
# Accent: Sky blue (#0EA5E9)
# Density: Compact (GitHub-like)

[theme]
base = "light"

# Main content area: clean white
backgroundColor = "#FFFFFF"

# Sidebar surface: streamlit reads this as the "secondary" surface.
# We override the sidebar to navy via CSS regardless of this value,
# but keep it neutral so any other "elevated" surface stays light.
secondaryBackgroundColor = "#F8FAFC"

# Text: dark slate (high contrast on white)
textColor = "#0F172A"

# Primary accent: sky blue (Tailwind 500)
primaryColor = "#0EA5E9"

font = "sans serif"


[server]
headless = true

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset password · Research Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800&display=swap" rel="stylesheet" />
<script>try{var t=localStorage.getItem("ara-theme")||"dark";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","dark");}</script>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237c83ff' stroke-width='2.2' stroke-linecap='round'%3E%3Ccircle cx='11' cy='11' r='7'/%3E%3Cpath d='M21 21l-4.3-4.3'/%3E%3C/svg%3E" />
<style>
:root{--bg:#f4f6fb;--panel:#ffffff;--panel-2:#f6f8fc;--border:#e4e8f0;--border-2:#d6dce8;
  --text:#111726;--soft:#475067;--muted:#8b95a9;--accent:#5b54f0;--ring:rgba(91,84,240,.22);
  --field:#fff;--grad:linear-gradient(135deg,#6366f1,#8b5cf6 55%,#d946ef);--ok:#0f9d6e;--err:#e0466b}
[data-theme="dark"]{--bg:#080a14;--panel:#0f1322;--panel-2:#141a2c;--border:#222a40;--border-2:#2c3550;
  --text:#eef1f8;--soft:#b6bfd4;--muted:#7a8399;--accent:#7c83ff;--ring:rgba(124,131,255,.32);
  --field:#0d1120;--grad:linear-gradient(135deg,#7c83ff,#a78bfa 55%,#e879f9)}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);font-family:"Inter",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;display:grid;place-items:center;overflow:hidden;font-size:15px}
.aurora{position:fixed;inset:0;overflow:hidden;z-index:0;pointer-events:none}
.aurora span{position:absolute;border-radius:50%;filter:blur(80px);opacity:.4;background:var(--grad)}
.aurora span:nth-child(1){width:42vw;height:42vw;left:-10vw;top:-12vh}
.aurora span:nth-child(2){width:36vw;height:36vw;right:-10vw;bottom:-12vh;background:linear-gradient(135deg,#22d3ee,#8b5cf6)}
[data-theme="light"] .aurora span{opacity:.22}
.card{position:relative;z-index:1;width:100%;max-width:392px;padding:34px 32px;border-radius:22px;
  background:color-mix(in srgb,var(--panel) 88%,transparent);border:1px solid var(--border);
  box-shadow:0 30px 80px -24px rgba(0,0,0,.5);backdrop-filter:blur(16px)}
.mk{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;background:var(--grad);margin-bottom:18px}
.mk svg{width:24px;height:24px}
h2{font-size:24px;font-weight:700;letter-spacing:-.02em;margin:0 0 6px}
.sub{font-size:14px;color:var(--soft);margin:0 0 22px;line-height:1.5}
label{display:block;font-size:13px;font-weight:600;color:var(--soft);margin:0 0 7px}
.inp{position:relative;margin-bottom:14px}
.inp input{width:100%;height:48px;padding:0 44px 0 15px;border-radius:13px;font-size:15px;color:var(--text);
  background:var(--field);border:1.5px solid var(--border);font-family:inherit;transition:.15s}
.inp input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--ring)}
.peek{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;
  color:var(--muted);padding:8px;border-radius:9px;display:grid;place-items:center}
.peek:hover{color:var(--text);background:var(--panel-2)}.peek svg{width:18px;height:18px}
.bar{height:5px;border-radius:3px;background:var(--panel-2);overflow:hidden;margin:2px 0 16px}
.bar i{display:block;height:100%;width:0;border-radius:3px;transition:width .25s,background .25s}
.btn{width:100%;height:49px;border:none;border-radius:13px;cursor:pointer;font:inherit;font-size:15px;
  font-weight:650;color:#fff;background:var(--grad);box-shadow:0 10px 28px -10px var(--ring);
  transition:transform .14s;display:flex;align-items:center;justify-content:center;gap:9px}
.btn:hover{transform:translateY(-1.5px)}.btn[disabled]{opacity:.65;cursor:not-allowed;transform:none}
.btn .spin{width:17px;height:17px;border:2.4px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.btn.loading .spin{display:block}@keyframes spin{to{transform:rotate(360deg)}}
.msg{margin-top:14px;font-size:13.5px;padding:11px 13px;border-radius:11px;display:none;line-height:1.5;border:1px solid transparent}
.msg.show{display:block}
.msg.err{color:var(--err);background:color-mix(in srgb,var(--err) 10%,transparent);border-color:color-mix(in srgb,var(--err) 24%,transparent)}
.msg.ok{color:var(--ok);background:color-mix(in srgb,var(--ok) 10%,transparent);border-color:color-mix(in srgb,var(--ok) 24%,transparent)}
.msg a{color:inherit;font-weight:700}
.foot{margin-top:18px;text-align:center;font-size:13px}
.foot a{color:var(--accent);font-weight:600;text-decoration:none}.foot a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="aurora"><span></span><span></span></div>
<div class="card">
  <div class="mk"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg></div>
  <h2>Choose a new password</h2>
  <p class="sub">Pick something you'll remember. It needs to be at least 6 characters.</p>
  <form id="form" novalidate>
    <label for="pw">New password</label>
    <div class="inp">
      <input id="pw" type="password" autocomplete="new-password" placeholder="••••••••" />
      <button type="button" class="peek" id="peek" aria-label="Show password"></button>
    </div>
    <div class="bar"><i id="bar"></i></div>
    <label for="pw2">Confirm password</label>
    <div class="inp">
      <input id="pw2" type="password" autocomplete="new-password" placeholder="••••••••" />
    </div>
    <button class="btn" id="submit" type="submit"><span class="spin"></span><span class="label">Update password</span></button>
    <div class="msg" id="msg"></div>
  </form>
  <div class="foot"><a href="/login">← Back to sign in</a></div>
</div>
<script>
const $=id=>document.getElementById(id);
const token=new URLSearchParams(location.search).get("token")||"";
const eye='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>';
const eyeOff='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 3l18 18M10.6 10.7a3 3 0 0 0 4.2 4.2"/><path d="M9.9 5.2A10.6 10.6 0 0 1 12 5c6.4 0 10 7 10 7a17 17 0 0 1-3.4 4.1M6.5 6.6A17 17 0 0 0 2 12s3.6 7 10 7c1 0 2-.1 2.9-.4"/></svg>';
$("peek").innerHTML=eye;
$("peek").onclick=()=>{const i=$("pw");const s=i.type==="password";i.type=s?"text":"password";$("peek").innerHTML=s?eyeOff:eye;i.focus();};
$("pw").addEventListener("input",()=>{const v=$("pw").value;let s=0;if(v.length>=6)s++;if(v.length>=10)s++;if(/[A-Z]/.test(v)&&/[a-z]/.test(v))s++;if(/[0-9\W]/.test(v))s++;
  const pct=[0,25,50,80,100][s]||0;const col=["#e0466b","#e0466b","#d97706","#0f9d6e","#0f9d6e"][s];$("bar").style.width=pct+"%";$("bar").style.background=col;});
function fail(t){const m=$("msg");m.className="msg err show";m.textContent=t;}
if(!token)fail("This reset link is missing its token. Request a new one from the sign-in page.");
$("form").addEventListener("submit",async e=>{
  e.preventDefault();
  const pw=$("pw").value,pw2=$("pw2").value;
  if(pw.length<6){fail("Password must be at least 6 characters.");return;}
  if(pw!==pw2){fail("The two passwords don't match.");return;}
  if(!token){fail("Missing reset token.");return;}
  const btn=$("submit");btn.classList.add("loading");btn.disabled=true;
  try{
    const res=await fetch("/api/reset-password",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,password:pw})});
    const d=await res.json().catch(()=>({}));
    if(res.ok&&d.ok){const m=$("msg");m.className="msg ok show";m.innerHTML="Password updated. Redirecting to sign in…";setTimeout(()=>location.href="/login",1400);return;}
    fail(d.error||"Couldn't reset your password. Please try again.");
  }catch(err){fail("Network error — please try again.");}
  btn.classList.remove("loading");btn.disabled=false;
});
</script>
</body>
</html>

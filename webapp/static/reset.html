<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset password · ResearchAI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231E6FD9' stroke-width='2' stroke-linecap='round'%3E%3Ccircle cx='12' cy='12' r='3'/%3E%3C/svg%3E" />
<style>
:root{--blue:#1E6FD9;--blue2:#3b82f6;--ink:#0A1628;--ink2:#1A3A6B;--slate:#cbd5e1;--err:#dc2626;--ok:#0f9d6e;
  --font:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;font-family:var(--font);color:var(--ink);-webkit-font-smoothing:antialiased;
  background:linear-gradient(135deg,#0A1628 0%,#102a52 45%,#1A3A6B 100%);display:grid;place-items:center;overflow:hidden}
.dots span{position:fixed;border-radius:50%;background:var(--blue2);filter:blur(.5px);opacity:.5}
.dots span:nth-child(1){width:9px;height:9px;left:14%;top:26%}
.dots span:nth-child(2){width:7px;height:7px;right:16%;bottom:24%;opacity:.4}
.card{position:relative;z-index:1;width:100%;max-width:430px;padding:36px;border-radius:24px;
  background:rgba(255,255,255,.97);border:1px solid rgba(255,255,255,.5);
  box-shadow:0 0 60px rgba(30,111,217,.30),0 30px 60px -30px rgba(0,0,0,.5);backdrop-filter:blur(20px)}
.mk{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;margin-bottom:18px;
  background:linear-gradient(135deg,#1E6FD9,#3b82f6);box-shadow:0 0 32px rgba(30,111,217,.5)}
.mk svg{width:26px;height:26px;color:#fff}
h2{font-size:26px;font-weight:800;letter-spacing:-.02em;margin:0 0 6px}
.sub{font-size:15px;color:rgba(26,58,107,.7);margin:0 0 24px;line-height:1.5}
label{display:block;font-size:14px;font-weight:600;color:var(--ink2);margin:0 0 8px}
.inp{position:relative;margin-bottom:14px}
.inp input{width:100%;height:46px;padding:0 44px 0 15px;border-radius:12px;font-size:15px;color:var(--ink);
  background:#fff;border:1.5px solid var(--slate);font-family:inherit;transition:.15s}
.inp input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 4px rgba(30,111,217,.16)}
.peek{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;
  color:rgba(26,58,107,.5);padding:8px;border-radius:8px;display:grid;place-items:center}
.peek:hover{color:var(--ink);background:#f1f5f9}.peek svg{width:17px;height:17px}
.bar{height:5px;border-radius:3px;background:#e2e8f0;overflow:hidden;margin:2px 0 16px}
.bar i{display:block;height:100%;width:0;border-radius:3px;transition:width .25s,background .25s}
.btn{width:100%;height:48px;border:none;border-radius:12px;cursor:pointer;font:inherit;font-size:16px;font-weight:700;
  color:#fff;background:var(--blue);box-shadow:0 8px 24px rgba(30,111,217,.4);
  display:flex;align-items:center;justify-content:center;gap:9px;transition:transform .14s,filter .14s}
.btn:hover{filter:brightness(1.06);transform:translateY(-1px)}.btn[disabled]{opacity:.7;cursor:not-allowed;transform:none}
.btn .spin{width:17px;height:17px;border:2.4px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.btn.loading .spin{display:block}@keyframes spin{to{transform:rotate(360deg)}}
.msg{margin-top:14px;font-size:14px;padding:11px 14px;border-radius:11px;display:none;line-height:1.5;border:1px solid transparent}
.msg.show{display:block}
.msg.err{color:var(--err);background:#fef2f2;border-color:#fecaca}
.msg.ok{color:var(--ok);background:#f0fdf4;border-color:#bbf7d0}
.foot{margin-top:18px;text-align:center;font-size:14px}
.foot a{color:var(--blue);font-weight:700;text-decoration:none}.foot a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="dots"><span></span><span></span></div>
<div class="card">
  <div class="mk"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg></div>
  <h2>Choose a new password</h2>
  <p class="sub">Pick something you'll remember — at least 6 characters.</p>
  <form id="form" novalidate>
    <label for="pw">New password</label>
    <div class="inp">
      <input id="pw" type="password" autocomplete="new-password" placeholder="••••••••" />
      <button type="button" class="peek" id="peek" aria-label="Show password"></button>
    </div>
    <div class="bar"><i id="bar"></i></div>
    <label for="pw2">Confirm password</label>
    <div class="inp"><input id="pw2" type="password" autocomplete="new-password" placeholder="••••••••" /></div>
    <button class="btn" id="submit" type="submit"><span class="spin"></span><span class="label">Update password</span></button>
    <div class="msg" id="msg"></div>
  </form>
  <div class="foot"><a href="/login">← Back to sign in</a></div>
</div>
<script>
const $=id=>document.getElementById(id);
const token=new URLSearchParams(location.search).get("token")||"";
const eye='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>';
const eyeOff='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M3 3l18 18M10.6 10.7a3 3 0 0 0 4.2 4.2"/><path d="M9.9 5.2A10.6 10.6 0 0 1 12 5c6.4 0 10 7 10 7a17 17 0 0 1-3.4 4.1M6.5 6.6A17 17 0 0 0 2 12s3.6 7 10 7c1 0 2-.1 2.9-.4"/></svg>';
$("peek").innerHTML=eye;
$("peek").onclick=()=>{const i=$("pw");const s=i.type==="password";i.type=s?"text":"password";$("peek").innerHTML=s?eyeOff:eye;i.focus();};
$("pw").addEventListener("input",()=>{const v=$("pw").value;let s=0;if(v.length>=6)s++;if(v.length>=10)s++;if(/[A-Z]/.test(v)&&/[a-z]/.test(v))s++;if(/[0-9\W]/.test(v))s++;
  const pct=[0,25,50,80,100][s]||0;const col=["#dc2626","#dc2626","#d97706","#0f9d6e","#0f9d6e"][s];$("bar").style.width=pct+"%";$("bar").style.background=col;});
function fail(t){const m=$("msg");m.className="msg err show";m.textContent=t;}
if(!token)fail("This reset link is missing its token. Request a new one from the sign-in page.");
$("form").addEventListener("submit",async e=>{
  e.preventDefault();
  const pw=$("pw").value,pw2=$("pw2").value;
  if(pw.length<6){fail("Password must be at least 6 characters.");return;}
  if(pw!==pw2){fail("The two passwords don't match.");return;}
  if(!token){fail("Missing reset token.");return;}
  const btn=$("submit");btn.classList.add("loading");btn.disabled=true;
  try{
    const res=await fetch("/api/reset-password",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,password:pw})});
    const d=await res.json().catch(()=>({}));
    if(res.ok&&d.ok){const m=$("msg");m.className="msg ok show";m.textContent="Password updated. Redirecting to sign in…";setTimeout(()=>location.href="/login",1400);return;}
    fail(d.error||"Couldn't reset your password. Please try again.");
  }catch(err){fail("Network error — please try again.");}
  btn.classList.remove("loading");btn.disabled=false;
});
</script>
</body>
</html>

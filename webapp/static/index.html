<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Assistant</title>
  <meta name="description" content="Ask anything — it searches the web, papers, patents & code and answers with cited, verified results." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;550;600;650;700&display=swap" rel="stylesheet" />
  <script>try { var t = localStorage.getItem("ara-theme") || "light"; document.documentElement.setAttribute("data-theme", t); } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }</script>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234f46e5' stroke-width='2.2' stroke-linecap='round'%3E%3Ccircle cx='11' cy='11' r='7'/%3E%3Cpath d='M21 21l-4.3-4.3'/%3E%3C/svg%3E" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- IDE-style code highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <!-- Math rendering (KaTeX) for $…$ / $$…$$ formulas -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
</head>
<body>
  <div class="app" id="app">

    <!-- ============ Sidebar ============ -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a3 3 0 1 0-5.997.142 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588 4 4 0 0 0 7.967.273V5z"/><path d="M12 5a3 3 0 1 1 5.997.142 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588 4 4 0 0 1-7.967.273V5z"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/></svg>
        </span>
        <div>
          <div class="title">Research</div>
          <div class="subtitle">Assistant</div>
        </div>
      </div>

      <button class="new-chat" id="newChatBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        New chat
      </button>

      <button class="add-paper" id="addPaperBtn" title="Upload one or more PDFs to add them to your searchable library">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/><path d="M12 11v6M9 14h6"/></svg>
        Add papers
      </button>
      <input type="file" id="pdfInput" accept="application/pdf,.pdf" multiple hidden />

      <div class="sessions-label">Conversations</div>
      <div class="sessions" id="sessions"></div>

      <div class="sidebar-foot">
        <!-- Model switcher (custom dropdown) -->
        <div class="model-pick" id="modelPick" title="Choose the language model">
          <button class="mp-current" id="modelBtn" type="button" aria-haspopup="listbox" aria-expanded="false"><span id="modelLabel">Loading…</span></button>
          <svg class="mp-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
          <div class="mp-menu" id="modelMenu" role="listbox" aria-label="Models"></div>
        </div>

        <!-- Your papers -->
        <button class="foot-row foot-lib" id="manageBtn" title="View and delete your papers">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          <span id="libLabel">loading library…</span>
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" style="margin-left:auto;opacity:.6"><path d="M9 18l6-6-6-6"/></svg>
        </button>

        <!-- Signed-in user + sign out (bottom-left) -->
        <div class="user-row" id="userChip" style="display:none">
          <span class="avatar" id="userAvatar" aria-hidden="true"></span>
          <span class="user-meta"><span class="user-name" id="userName" title="Signed in"></span><span class="user-sub">Signed in</span></span>
          <button class="signout-btn" id="logoutBtn" title="Sign out" aria-label="Sign out">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- ============ Main ============ -->
    <main class="main">
      <div class="scroll-beam" id="scrollBeam" aria-hidden="true"></div>
      <header class="topbar">
        <button class="icon-btn menu-btn" id="menuBtn" aria-label="Menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
        <span class="spacer"></span>
        <button class="icon-btn theme-toggle" id="themeBtn" title="Toggle dark / light theme" aria-label="Toggle theme"></button>
      </header>

      <div class="transcript" id="transcript">
        <div class="transcript-inner" id="transcriptInner">
          <!-- welcome / messages injected here -->
        </div>
      </div>

      <button class="to-bottom" id="toBottom">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
        Jump to latest
      </button>

      <div class="composer-wrap">
        <div class="composer">
          <textarea id="input" rows="1" placeholder="Ask anything — or give it a coding task…" autofocus></textarea>
          <button class="send" id="sendBtn" aria-label="Send" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 11l5-5 5 5M12 6v13"/></svg>
          </button>
        </div>
        <div class="composer-hint"><kbd>Enter</kbd> to send · <kbd>Shift</kbd>+<kbd>Enter</kbd> for a new line · <kbd>Ctrl</kbd>+<kbd>K</kbd> new chat</div>
      </div>
    </main>
  </div>

  <!-- ============ Ingest progress modal ============ -->
  <div class="modal-scrim" id="ingestScrim"></div>
  <div class="ingest-modal" id="ingestModal" role="dialog" aria-label="Indexing paper">
    <div class="im-head">
      <span class="im-spinner" id="imSpinner"></span>
      <span class="im-check" id="imCheck" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      </span>
      <div class="im-titles">
        <div class="im-title" id="imTitle">Adding your paper…</div>
        <div class="im-stage" id="imStage">Starting…</div>
      </div>
    </div>
    <pre class="im-log" id="imLog"></pre>
    <div class="im-foot" id="imFoot" hidden>
      <button class="new-chat" id="imDone" style="margin:0;width:100%">Done</button>
    </div>
  </div>

  <!-- ============ Your papers (manage / delete) ============ -->
  <div class="modal-scrim" id="papersScrim"></div>
  <div class="papers-modal" id="papersModal" role="dialog" aria-label="Your papers">
    <div class="pm-head">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <h3>Your papers</h3>
      <span class="count" id="pmCount">0</span>
      <span style="flex:1"></span>
      <button class="icon-btn" id="pmClose" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="pm-body" id="pmBody"></div>
  </div>

  <div class="cite-pop" id="citePop"></div>
  <div class="toasts" id="toasts"></div>

  <script defer src="/static/app.js"></script>
</body>
</html>

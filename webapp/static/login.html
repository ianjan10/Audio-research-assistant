<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · Audio Research Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f6f7f9; --card: #ffffff; --text: #1b1f2a; --muted: #6b7280;
      --border: #e5e7eb; --accent: #4f46e5; --accent-weak: #eef0fe;
      --accent-ring: rgba(79,70,229,.28); --danger: #dc2626; --ok: #059669;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#0e1220; --card:#171c2c; --text:#e7e9f2; --muted:#9aa1b5;
              --border:#2a3146; --accent:#7c83ff; --accent-weak:rgba(124,131,255,.16);
              --accent-ring:rgba(124,131,255,.34); }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(900px 500px at 50% -10%, color-mix(in srgb, var(--accent) 16%, transparent), transparent),
        var(--bg);
      color: var(--text); padding: 24px;
    }
    .card {
      width: 100%; max-width: 390px; background: var(--card);
      border: 1px solid var(--border); border-radius: 18px; padding: 32px 30px;
      box-shadow: 0 18px 50px rgba(15,23,42,.12);
    }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .brand .logo { font-size: 26px; }
    .brand h1 { font-size: 18px; margin: 0; font-weight: 700; letter-spacing: -.01em; }

    /* Segmented Sign in / Sign up tabs */
    .tabs { display: flex; background: var(--accent-weak); border-radius: 11px; padding: 4px; margin-bottom: 18px; }
    .tab {
      flex: 1; border: none; background: transparent; cursor: pointer; padding: 9px;
      font: inherit; font-size: 13.5px; font-weight: 600; color: var(--muted);
      border-radius: 8px; transition: all .15s;
    }
    .tab.active { background: var(--card); color: var(--accent); box-shadow: 0 1px 3px rgba(0,0,0,.08); }

    .sub { color: var(--muted); font-size: 13px; margin: 0 0 16px; }
    label { display: block; font-size: 12.5px; font-weight: 600; margin: 14px 0 6px; }
    input {
      width: 100%; padding: 11px 13px; font-size: 14.5px; color: var(--text);
      background: transparent; border: 1px solid var(--border); border-radius: 10px;
      font-family: inherit; transition: border-color .15s, box-shadow .15s;
    }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-ring); }
    button.primary {
      width: 100%; margin-top: 20px; padding: 12px; font-size: 14.5px; font-weight: 600;
      color: #fff; background: var(--accent); border: none; border-radius: 10px;
      cursor: pointer; font-family: inherit; transition: filter .15s, transform .05s;
    }
    button.primary:hover { filter: brightness(1.06); }
    button.primary:active { transform: translateY(1px); }
    button.primary:disabled { opacity: .6; cursor: progress; }
    .msg { margin-top: 14px; font-size: 13px; min-height: 18px; text-align: center; }
    .msg.error { color: var(--danger); } .msg.ok { color: var(--ok); }
    .row-between { display: flex; justify-content: flex-end; margin-top: 8px; }
    .linkbtn { background: none; border: none; color: var(--accent); font: inherit;
               font-size: 12.5px; font-weight: 600; cursor: pointer; padding: 0; }
    .help {
      margin-top: 16px; padding: 13px 14px; font-size: 12.8px; line-height: 1.55;
      background: var(--accent-weak); border: 1px solid var(--border); border-radius: 11px;
      color: var(--text);
    }
    .help code { background: rgba(127,127,127,.18); padding: 2px 6px; border-radius: 6px;
                 font-size: 12px; word-break: break-all; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <form class="card" id="form" autocomplete="on">
    <div class="brand"><span class="logo">🔊</span><h1>Audio Research Assistant</h1></div>

    <div class="tabs" role="tablist">
      <button type="button" class="tab active" id="tabLogin" role="tab">Sign in</button>
      <button type="button" class="tab" id="tabSignup" role="tab">Sign up</button>
    </div>

    <p class="sub" id="subtitle">Sign in with your account.</p>

    <label for="user_id">User ID</label>
    <input id="user_id" name="username" type="text" autocomplete="username"
           autocapitalize="none" spellcheck="false" required autofocus />

    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required />

    <div id="confirmWrap" class="hidden">
      <label for="confirm">Confirm password</label>
      <input id="confirm" type="password" autocomplete="new-password" />
    </div>

    <div class="row-between" id="forgotRow">
      <button type="button" class="linkbtn" id="forgotLink">Forgot password?</button>
    </div>

    <button type="submit" class="primary" id="submit">Sign in</button>
    <div class="msg" id="msg"></div>

    <div class="help hidden" id="forgotHelp">
      For security, passwords can't be reset from this screen. Ask your administrator
      to set a new one with:<br /><br />
      <code>python -m backend.auth.users passwd YOUR_USER_ID</code>
    </div>
  </form>

  <script>
    const $ = (id) => document.getElementById(id);
    const form = $('form'), msg = $('msg'), submit = $('submit'), subtitle = $('subtitle');
    const confirmWrap = $('confirmWrap'), forgotRow = $('forgotRow'), forgotHelp = $('forgotHelp');
    const tabLogin = $('tabLogin'), tabSignup = $('tabSignup');
    let mode = 'login';        // 'login' | 'signup'
    let signupAllowed = true;  // updated from /api/me

    fetch('/api/me').then(r => r.json()).then(d => {
      signupAllowed = (d.signup !== false);
    }).catch(() => {});

    function setMode(m) {
      mode = m;
      const login = m === 'login';
      tabLogin.classList.toggle('active', login);
      tabSignup.classList.toggle('active', !login);
      subtitle.textContent = login ? 'Sign in with your account.' : 'Create a new account.';
      submit.textContent = login ? 'Sign in' : 'Create account';
      confirmWrap.classList.toggle('hidden', login);
      forgotRow.classList.toggle('hidden', !login);
      forgotHelp.classList.add('hidden');
      $('password').autocomplete = login ? 'current-password' : 'new-password';
      msg.textContent = ''; msg.className = 'msg';
    }
    tabLogin.addEventListener('click', () => setMode('login'));
    tabSignup.addEventListener('click', () => setMode('signup'));
    $('forgotLink').addEventListener('click', () => forgotHelp.classList.toggle('hidden'));

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const user_id = $('user_id').value.trim();
      const password = $('password').value;
      if (!user_id || !password) return;
      if (mode === 'signup') {
        if ($('confirm').value !== password) {
          msg.className = 'msg error'; msg.textContent = 'Passwords do not match.'; return;
        }
        if (!signupAllowed) {
          msg.className = 'msg error';
          msg.textContent = 'Sign-ups are disabled. Ask an admin to create your account.';
          return;
        }
      }
      submit.disabled = true;
      msg.className = 'msg'; msg.textContent = mode === 'login' ? 'Signing in…' : 'Creating account…';
      try {
        const res = await fetch('/api/' + (mode === 'login' ? 'login' : 'signup'), {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id, password }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.ok) {
          msg.className = 'msg ok'; msg.textContent = 'Welcome! Loading…';
          window.location.href = '/';
        } else {
          msg.className = 'msg error';
          msg.textContent = data.error || (mode === 'login' ? 'Sign in failed.' : 'Could not create account.');
          submit.disabled = false;
        }
      } catch (err) {
        msg.className = 'msg error'; msg.textContent = 'Network error. Try again.';
        submit.disabled = false;
      }
    });
  </script>
</body>
</html>
